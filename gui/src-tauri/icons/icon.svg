<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a1d27"/>
      <stop offset="1" stop-color="#0f1117"/>
    </linearGradient>
    <linearGradient id="shield" x1="256" y1="120" x2="256" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6b9df5"/>
      <stop offset="1" stop-color="#4a7fd4"/>
    </linearGradient>
    <linearGradient id="route" x1="256" y1="256" x2="420" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5b8def"/>
      <stop offset="1" stop-color="#3ecf8e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- routing paths -->
  <path d="M256 248 C256 248 340 200 392 168" stroke="url(#route)" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M256 264 C256 264 380 280 420 320" stroke="#5b8def" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.75"/>
  <path d="M256 264 C256 264 132 280 92 320" stroke="#5b8def" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.75"/>
  <path d="M256 248 C256 248 172 200 120 168" stroke="url(#route)" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.85"/>
  <!-- route nodes -->
  <circle cx="392" cy="168" r="22" fill="#3ecf8e"/>
  <circle cx="420" cy="320" r="18" fill="#5b8def"/>
  <circle cx="92" cy="320" r="18" fill="#5b8def"/>
  <circle cx="120" cy="168" r="22" fill="#3ecf8e"/>
  <!-- shield -->
  <path d="M256 128 L336 168 V248 C336 296 256 336 256 336 C256 336 176 296 176 248 V168 Z" fill="url(#shield)"/>
  <path d="M256 128 L336 168 V248 C336 296 256 336 256 336 C256 336 176 296 176 248 V168 Z" stroke="#8eb8ff" stroke-width="4" fill="none" opacity="0.35"/>
  <!-- hub -->
  <circle cx="256" cy="248" r="28" fill="#0f1117" stroke="#5b8def" stroke-width="6"/>
  <!-- security check -->
  <path d="M244 248 L252 256 L272 232" stroke="#3ecf8e" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
